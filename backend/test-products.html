<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Produits - Listera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .token-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
        }
        .token-section input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: monospace;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover {
            background: #5568d3;
        }
        .response {
            margin-top: 15px;
            padding: 15px;
            border-radius: 5px;
            display: none;
            word-wrap: break-word;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .products-list {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .product-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .product-actions {
            display: flex;
            gap: 10px;
        }
        .product-actions button {
            width: auto;
            padding: 8px 15px;
            margin: 0;
        }
        .btn-danger {
            background: #dc3545;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .btn-warning {
            background: #ffc107;
            color: #333;
        }
        .btn-warning:hover {
            background: #e0a800;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛍️ Test des Produits - API Listera</h1>
            <p>Testez toutes les fonctionnalités CRUD des produits</p>
            
            <div class="token-section">
                <label><strong>🔑 Token d'authentification (requis pour toutes les opérations) :</strong></label>
                <input type="text" id="authToken" placeholder="Collez votre token JWT ici (connectez-vous d'abord sur test-auth.html)">
                <p style="margin-top: 10px; color: #666; font-size: 14px;">
                    Vous n'avez pas de token ? 
                    <a href="test-auth.html" target="_blank" style="color: #667eea;">Connectez-vous d'abord ici</a>
                </p>
            </div>
        </div>

        <div class="grid">
            <!-- Créer un produit -->
            <div class="card">
                <h2>➕ Créer un produit</h2>
                <input type="text" id="createTitle" placeholder="Titre du produit" value="iPhone 13 Pro Max">
                <textarea id="createDescription" placeholder="Description">Excellent état, débloqué tout opérateur. Batterie 95%. Aucune rayure.</textarea>
                <input type="number" id="createPrice" placeholder="Prix" value="799.99" step="0.01">
                <input type="text" id="createCategory" placeholder="Catégorie" value="Électronique">
                <select id="createStatus">
                    <option value="draft">Brouillon</option>
                    <option value="active">Actif</option>
                    <option value="sold">Vendu</option>
                </select>
                <button onclick="createProduct()">Créer le produit</button>
                <div id="createResponse" class="response"></div>
            </div>

            <!-- Liste des produits -->
            <div class="card">
                <h2>📋 Mes produits</h2>
                <select id="filterStatus">
                    <option value="">Tous les statuts</option>
                    <option value="draft">Brouillons</option>
                    <option value="active">Actifs</option>
                    <option value="sold">Vendus</option>
                </select>
                <button onclick="getProducts()">Charger mes produits</button>
                <div id="getResponse" class="response"></div>
            </div>

            <!-- Statistiques -->
            <div class="card">
                <h2>📊 Statistiques</h2>
                <button onclick="getStats()">Voir les statistiques</button>
                <div id="statsResponse" class="response"></div>
            </div>
        </div>

        <!-- Liste des produits -->
        <div class="products-list" id="productsList" style="display: none;">
            <h2>📦 Vos produits</h2>
            <div id="productsContainer"></div>
        </div>
    </div>

    <script>
        // Charger automatiquement le token depuis localStorage
        window.addEventListener('DOMContentLoaded', () => {
            const savedToken = localStorage.getItem('listera_token');
            if (savedToken) {
                document.getElementById('authToken').value = savedToken;
                console.log('✅ Token chargé automatiquement depuis localStorage');
            } else {
                console.log('⚠️ Aucun token trouvé. Connectez-vous d\'abord sur test-auth.html');
            }
        });
        const API_URL = 'http://localhost:5000/api/products';

        function getToken() {
            const token = document.getElementById('authToken').value.trim();
            if (!token) {
                alert('⚠️ Veuillez d\'abord vous connecter et coller votre token JWT !');
                return null;
            }
            return token;
        }

        async function createProduct() {
            const token = getToken();
            if (!token) return;

            const responseDiv = document.getElementById('createResponse');
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        title: document.getElementById('createTitle').value,
                        description: document.getElementById('createDescription').value,
                        price: document.getElementById('createPrice').value,
                        category: document.getElementById('createCategory').value,
                        status: document.getElementById('createStatus').value,
                        images: []
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    responseDiv.className = 'response success';
                    responseDiv.innerHTML = `
                        <strong>${data.message}</strong><br>
                        ID: ${data.product.id}<br>
                        Titre: ${data.product.title}<br>
                        Prix: ${data.product.price} €<br>
                        Statut: ${data.product.status}
                    `;
                    // Recharger la liste
                    getProducts();
                } else {
                    responseDiv.className = 'response error';
                    responseDiv.innerHTML = `<strong>Erreur:</strong> ${data.error}`;
                }

                responseDiv.style.display = 'block';
            } catch (error) {
                responseDiv.className = 'response error';
                responseDiv.innerHTML = `<strong>Erreur:</strong> ${error.message}`;
                responseDiv.style.display = 'block';
            }
        }

        async function getProducts() {
            const token = getToken();
            if (!token) return;

            const responseDiv = document.getElementById('getResponse');
            const status = document.getElementById('filterStatus').value;
            
            let url = API_URL;
            if (status) {
                url += `?status=${status}`;
            }

            try {
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    responseDiv.className = 'response success';
                    responseDiv.innerHTML = `
                        <strong>✅ ${data.total} produit(s) trouvé(s)</strong>
                    `;
                    responseDiv.style.display = 'block';

                    // Afficher la liste
                    displayProducts(data.products);
                } else {
                    responseDiv.className = 'response error';
                    responseDiv.innerHTML = `<strong>Erreur:</strong> ${data.error}`;
                    responseDiv.style.display = 'block';
                }
            } catch (error) {
                responseDiv.className = 'response error';
                responseDiv.innerHTML = `<strong>Erreur:</strong> ${error.message}`;
                responseDiv.style.display = 'block';
            }
        }

        function displayProducts(products) {
            const container = document.getElementById('productsContainer');
            const listDiv = document.getElementById('productsList');

            if (products.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #666;">Aucun produit trouvé</p>';
                listDiv.style.display = 'block';
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="product-item">
                    <div>
                        <strong>${product.title}</strong><br>
                        <small>Prix: ${product.price} € | Statut: ${product.status} | ID: ${product.id}</small>
                    </div>
                    <div class="product-actions">
                        <button class="btn-warning" onclick="editProduct(${product.id})">✏️ Modifier</button>
                        <button class="btn-danger" onclick="deleteProduct(${product.id})">🗑️ Supprimer</button>
                    </div>
                </div>
            `).join('');

            listDiv.style.display = 'block';
        }

        async function deleteProduct(id) {
            if (!confirm('Êtes-vous sûr de vouloir supprimer ce produit ?')) return;

            const token = getToken();
            if (!token) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    alert('✅ ' + data.message);
                    getProducts();
                } else {
                    alert('❌ Erreur: ' + data.error);
                }
            } catch (error) {
                alert('❌ Erreur: ' + error.message);
            }
        }

        function editProduct(id) {
            const newTitle = prompt('Nouveau titre du produit:');
            if (!newTitle) return;

            updateProduct(id, { title: newTitle });
        }

        async function updateProduct(id, updates) {
            const token = getToken();
            if (!token) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(updates)
                });

                const data = await response.json();

                if (response.ok) {
                    alert('✅ ' + data.message);
                    getProducts();
                } else {
                    alert('❌ Erreur: ' + data.error);
                }
            } catch (error) {
                alert('❌ Erreur: ' + error.message);
            }
        }

        async function getStats() {
            const token = getToken();
            if (!token) return;

            const responseDiv = document.getElementById('statsResponse');

            try {
                const response = await fetch(`${API_URL}/stats`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    responseDiv.className = 'response success';
                    responseDiv.innerHTML = `
                        <div class="stats">
                            <div class="stat-card">
                                <div class="stat-number">${data.stats.total}</div>
                                <div class="stat-label">Total</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${data.stats.draft}</div>
                                <div class="stat-label">Brouillons</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${data.stats.active}</div>
                                <div class="stat-label">Actifs</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${data.stats.sold}</div>
                                <div class="stat-label">Vendus</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${data.stats.averagePrice.toFixed(2)} €</div>
                                <div class="stat-label">Prix moyen</div>
                            </div>
                        </div>
                    `;
                    responseDiv.style.display = 'block';
                } else {
                    responseDiv.className = 'response error';
                    responseDiv.innerHTML = `<strong>Erreur:</strong> ${data.error}`;
                    responseDiv.style.display = 'block';
                }
            } catch (error) {
                responseDiv.className = 'response error';
                responseDiv.innerHTML = `<strong>Erreur:</strong> ${error.message}`;
                responseDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
