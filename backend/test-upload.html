<!DOCTYPE html>

<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Test Upload Images - Listera</title>

    <style>

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

        }

        body {

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            min-height: 100vh;

            padding: 20px;

        }

        .container {

            max-width: 900px;

            margin: 0 auto;

        }

        .card {

            background: white;

            padding: 30px;

            border-radius: 15px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.2);

            margin-bottom: 20px;

        }

        h1 {

            color: #333;

            margin-bottom: 10px;

        }

        .token-section {

            background: #f8f9fa;

            padding: 15px;

            border-radius: 10px;

            margin: 20px 0;

        }

        .token-section input {

            width: 100%;

            padding: 12px;

            border: 2px solid #ddd;

            border-radius: 8px;

            font-family: monospace;

            font-size: 13px;

        }

        .upload-area {

            border: 3px dashed #667eea;

            border-radius: 15px;

            padding: 40px;

            text-align: center;

            margin: 20px 0;

            background: #f8f9ff;

            cursor: pointer;

            transition: all 0.3s;

        }

        .upload-area:hover {

            border-color: #5568d3;

            background: #f0f2ff;

        }

        .upload-area.dragging {

            border-color: #4caf50;

            background: #e8f5e9;

        }

        input[type="file"] {

            display: none;

        }

        button {

            width: 100%;

            padding: 15px;

            background: #667eea;

            color: white;

            border: none;

            border-radius: 10px;

            cursor: pointer;

            font-size: 16px;

            font-weight: 600;

            margin-top: 15px;

            transition: background 0.3s;

        }

        button:hover {

            background: #5568d3;

        }

        button:disabled {

            background: #ccc;

            cursor: not-allowed;

        }

        .preview-grid {

            display: grid;

            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));

            gap: 15px;

            margin-top: 20px;

        }

        .preview-item {

            position: relative;

            border-radius: 10px;

            overflow: hidden;

            box-shadow: 0 4px 6px rgba(0,0,0,0.1);

        }

        .preview-item img {

            width: 100%;

            height: 150px;

            object-fit: cover;

        }

        .preview-item button {

            position: absolute;

            top: 5px;

            right: 5px;

            width: 30px;

            height: 30px;

            padding: 0;

            background: #f44336;

            border-radius: 50%;

            font-size: 18px;

            line-height: 1;

        }

        .response {

            margin-top: 20px;

            padding: 15px;

            border-radius: 10px;

            display: none;

        }

        .success {

            background: #d4edda;

            color: #155724;

            border: 2px solid #c3e6cb;

        }

        .error {

            background: #f8d7da;

            color: #721c24;

            border: 2px solid #f5c6cb;

        }

        .uploaded-images {

            display: grid;

            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));

            gap: 20px;

            margin-top: 20px;

        }

        .uploaded-item {

            background: #f8f9fa;

            padding: 15px;

            border-radius: 10px;

        }

        .uploaded-item img {

            width: 100%;

            height: 150px;

            object-fit: cover;

            border-radius: 8px;

            margin-bottom: 10px;

        }

        .url-box {

            background: white;

            padding: 8px;

            border-radius: 5px;

            font-family: monospace;

            font-size: 11px;

            word-break: break-all;

            margin: 5px 0;

        }

        .label {

            font-weight: bold;

            font-size: 12px;

            color: #666;

            margin-top: 8px;

        }

    </style>

</head>

<body>

    <div class="container">

        <div class="card">

            <h1>📸 Test Upload d'Images - Listera</h1>

            <p>Uploadez jusqu'à 10 images (JPG, PNG, WEBP, GIF - Max 5MB chacune)</p>


            <div class="token-section">

                <label><strong>🔑 Token d'authentification :</strong></label>

                <input type="text" id="authToken" placeholder="Collez votre token JWT ici">

                <p style="margin-top: 10px; color: #666; font-size: 14px;">

                    <a href="test-auth.html" target="_blank" style="color: #667eea;">Connectez-vous d'abord ici</a>

                </p>

            </div>


            <div class="upload-area" id="uploadArea">

                <p style="font-size: 48px; margin-bottom: 10px;">📁</p>

                <p style="font-size: 18px; font-weight: 600;">Glissez-déposez vos images ici</p>

                <p style="color: #666; margin-top: 10px;">ou cliquez pour sélectionner</p>

                <input type="file" id="fileInput" multiple accept="image/*">

            </div>


            <div class="preview-grid" id="previewGrid"></div>


            <button id="uploadBtn" disabled>Uploader les images</button>


            <div id="response" class="response"></div>

        </div>


        <div class="card" id="uploadedSection" style="display: none;">

            <h2>✅ Images uploadées</h2>

            <div class="uploaded-images" id="uploadedImages"></div>

        </div>

    </div>


    <script>

        // Charger automatiquement le token depuis localStorage

        window.addEventListener('DOMContentLoaded', () => {

            const savedToken = localStorage.getItem('listera_token');

            if (savedToken) {
                document.getElementById('authToken').value = savedToken;

            }

        });


        const API_URL = 'http://localhost:5000/api/upload';

        const uploadArea = document.getElementById('uploadArea');

        const fileInput = document.getElementById('fileInput');

        const previewGrid = document.getElementById('previewGrid');

        const uploadBtn = document.getElementById('uploadBtn');

        const responseDiv = document.getElementById('response');

        let selectedFiles = [];


        // Clic sur la zone d'upload

        uploadArea.addEventListener('click', () => fileInput.click());


        // Sélection de fichiers

        fileInput.addEventListener('change', (e) => {

            handleFiles(e.target.files);

        });


        // Drag & Drop

        uploadArea.addEventListener('dragover', (e) => {

            e.preventDefault();

            uploadArea.classList.add('dragging');

        });


        uploadArea.addEventListener('dragleave', () => {

            uploadArea.classList.remove('dragging');

        });


        uploadArea.addEventListener('drop', (e) => {

            e.preventDefault();

            uploadArea.classList.remove('dragging');

            handleFiles(e.dataTransfer.files);

        });


        function handleFiles(files) {

            selectedFiles = Array.from(files).filter(file => {

                return file.type.startsWith('image/');

            }).slice(0, 10); // Max 10 images


            displayPreviews();

            uploadBtn.disabled = selectedFiles.length === 0;

        }


        function displayPreviews() {

            previewGrid.innerHTML = '';

            

            selectedFiles.forEach((file, index) => {

                const reader = new FileReader();

                

                reader.onload = (e) => {

                    const div = document.createElement('div');

                    div.className = 'preview-item';

                    div.innerHTML = `

                        <img src="${e.target.result}" alt="Preview">

                        <button onclick="removeFile(${index})">×</button>

                    `;

                    previewGrid.appendChild(div);

                };

                

                reader.readAsDataURL(file);

            });

        }


        function removeFile(index) {

            selectedFiles.splice(index, 1);

            displayPreviews();

            uploadBtn.disabled = selectedFiles.length === 0;

        }


        uploadBtn.addEventListener('click', async () => {

            const token = document.getElementById('authToken').value.trim();

            

            if (!token) {

                alert('⚠️ Veuillez d\'abord vous connecter et coller votre token JWT !');

                return;

            }


            if (selectedFiles.length === 0) {

                alert('⚠️ Veuillez sélectionner au moins une image !');

                return;

            }


            uploadBtn.disabled = true;

            uploadBtn.textContent = 'Upload en cours...';


            const formData = new FormData();

            selectedFiles.forEach(file => {

                formData.append('images', file);

            });


            try {

                const response = await fetch(API_URL, {

                    method: 'POST',

                    headers: {

                        'Authorization': `Bearer ${token}`

                    },

                    body: formData

                });


                const data = await response.json();


                if (response.ok) {

                    responseDiv.className = 'response success';

                    responseDiv.innerHTML = `<strong>${data.message}</strong>`;

                    responseDiv.style.display = 'block';


                    // Afficher les images uploadées

                    displayUploadedImages(data.images);


                    // Réinitialiser

                    selectedFiles = [];

                    previewGrid.innerHTML = '';

                    fileInput.value = '';

                } else {

                    responseDiv.className = 'response error';

                    responseDiv.innerHTML = `<strong>Erreur:</strong> ${data.error}`;
                    responseDiv.style.display = 'block';

                }


            } catch (error) {

                responseDiv.className = 'response error';

                responseDiv.innerHTML = `<strong>Erreur:</strong> ${error.message}`;

                responseDiv.style.display = 'block';

            } finally {

                uploadBtn.disabled = false;

                uploadBtn.textContent = 'Uploader les images';

            }

        });


        function displayUploadedImages(images) {

            const container = document.getElementById('uploadedImages');

            const section = document.getElementById('uploadedSection');


            images.forEach(img => {

                const div = document.createElement('div');

                div.className = 'uploaded-item';

                div.innerHTML = `

                    <img src="${img.medium}" alt="Uploaded">

                    <div class="label">Thumbnail:</div>

                    <div class="url-box">${img.thumbnail}</div>

                    <div class="label">Medium:</div>

                    <div class="url-box">${img.medium}</div>

                    <div class="label">Large:</div>

                    <div class="url-box">${img.large}</div>

                `;

                container.appendChild(div);

            });


            section.style.display = 'block';

        }

    </script>

</body>

</html>
